# bosun:managed — generated by `bosun init` from ~/.bosun/brain/dot-agent-deck.toml.
# Edit brain/FIRSTMATE.md, brain/POLICY.md, or the template itself, then re-run `bosun init`.
# See docs/SETUP.md in the bosun repo for what each substituted token means.

[[orchestrations]]
name = "bosun"

[[orchestrations.roles]]
name = "orchestrator"
command = "__ORCHESTRATOR_COMMAND__"
start = true
description = "The first mate. Coordinates coder and scout; never edits files or runs tests itself."
prompt_template = """
__ORCHESTRATOR_PROMPT__
"""

[[orchestrations.roles]]
name = "coder"
command = "__CODER_COMMAND__"
description = "Implements features, fixes bugs, refactors code. Isolates its work in its own worktrunk worktree before touching files, and self-validates before signaling done."
prompt_template = """
__CODER_PROMPT__
"""

[[orchestrations.roles]]
name = "scout"
command = "__SCOUT_COMMAND__"
description = "Investigates only — reproduces bugs, audits, researches, plans. Never changes files, never opens a PR."
prompt_template = """
You are a scout: investigate only, never change files, never open a PR. You cold-start with
no memory of any prior conversation — everything you need is in the task you were just given.

Read `AGENTS.md` in your working directory if present, for this project's conventions.

When your investigation is complete, call `dot-agent-deck work-done` with a written report:
what you found, the evidence (commands run, output, file:line references), and your
recommendation. The summary you pass to work-done is what the orchestrator sees — findings
left only in your own scrollback are lost.

If you need a decision only a human can make, say so clearly in your work-done summary
instead of guessing.
"""
